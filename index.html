<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Favoris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-hover: #f0f2f5;
            --text-primary: #1a202c;
            --text-secondary: #718096;
            --border: #e2e8f0;
            --accent: #4299e1;
            --accent-hover: #3182ce;
            --danger: #f56565;
            --danger-hover: #e53e3e;
            --success: #48bb78;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        .dark-mode {
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-hover: #374151;
            --text-primary: #f7fafc;
            --text-secondary: #cbd5e0;
            --border: #4a5568;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .google-search-container {
            max-width: 700px;
            margin: 0 auto 20px;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .google-search-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .google-search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .google-search-input:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }

        .google-search-btn {
            padding: 12px 28px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .google-search-btn:hover {
            background: #3367d6;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .search-results-info {
            text-align: center;
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .highlight {
            background: linear-gradient(135deg, var(--accent), var(--success));
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 500;
        }

        .section.filtered-out,
        .subsection.filtered-out {
            display: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            flex: 1;
        }

        .section-controls {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .controls-visible .section-controls,
        .controls-visible .subsection-controls,
        .controls-visible .bookmark-controls {
            opacity: 1;
        }

        .subsections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .subsection {
            background: var(--bg-hover);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .subsection:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .subsection-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .subsection-title {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .subsection-controls {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bookmarks-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bookmark-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .bookmark-item:hover {
            background: var(--bg-hover);
        }

        .bookmark-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            text-decoration: none;
            flex: 1;
        }

        .bookmark-link:hover {
            color: var(--accent);
        }

        .bookmark-icon {
            font-size: 1.2rem;
        }

        .bookmark-controls {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-small {
            padding: 4px 10px;
            font-size: 0.8rem;
        }

        .btn-icon {
            padding: 6px 10px;
        }

        .footer-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 2px solid var(--border);
            padding: 16px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 -2px 12px var(--shadow);
            z-index: 100;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 24px var(--shadow);
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .dragging {
            opacity: 0.5;
        }

        .drag-over {
            border: 2px dashed var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .subsections-grid {
                grid-template-columns: 1fr;
            }
            
            .footer-controls {
                padding: 12px 10px;
                gap: 8px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Mes Favoris</h1>
            
            <!-- Recherche Google -->
            <div class="google-search-container">
                <form class="google-search-form" id="googleSearchForm" action="https://www.google.ca/search" method="get" target="_blank">
                    <input type="text" name="q" class="google-search-input" placeholder="Rechercher sur Google.ca..." autocomplete="off">
                    <button type="submit" class="google-search-btn">
                        <span>🔍</span>
                        <span>Rechercher</span>
                    </button>
                </form>
            </div>
            
            <!-- Recherche dans les favoris -->
            <div class="search-container">
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher dans vos favoris...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="search-results-info" id="searchResultsInfo"></div>
            </div>
        </div>
        <div id="sections-container"></div>
    </div>

    <div class="footer-controls">
        <button class="btn btn-primary" id="toggleControlsBtn">👁️ Afficher les contrôles</button>
        <button class="btn btn-primary" id="addSectionBtn">➕ Ajouter Section</button>
        <button class="btn btn-primary" id="darkModeBtn">🌙 Mode Sombre</button>
        <button class="btn btn-primary" id="exportBtn">💾 Exporter</button>
        <button class="btn btn-primary" id="importBtn">📁 Importer</button>
        <input type="file" id="importInput" accept=".json" style="display: none;">
    </div>

    <!-- Modal pour ajouter/modifier section -->
    <div id="sectionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Ajouter une section</div>
            <div class="form-group">
                <label>Nom de la section</label>
                <input type="text" id="sectionNameInput" placeholder="Ex: Travail, Loisirs...">
            </div>
            <div class="modal-actions">
                <button class="btn" id="cancelSectionBtn">Annuler</button>
                <button class="btn btn-primary" id="saveSectionBtn">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Modal pour ajouter/modifier sous-section -->
    <div id="subsectionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Ajouter une sous-section</div>
            <div class="form-group">
                <label>Nom de la sous-section</label>
                <input type="text" id="subsectionNameInput" placeholder="Ex: Outils, Documentation...">
            </div>
            <div class="modal-actions">
                <button class="btn" id="cancelSubsectionBtn">Annuler</button>
                <button class="btn btn-primary" id="saveSubsectionBtn">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Modal pour ajouter/modifier favori -->
    <div id="bookmarkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Ajouter un favori</div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="bookmarkNameInput" placeholder="Ex: Google">
            </div>
            <div class="form-group">
                <label>URL</label>
                <input type="text" id="bookmarkUrlInput" placeholder="https://example.com">
            </div>
            <div class="modal-actions">
                <button class="btn" id="cancelBookmarkBtn">Annuler</button>
                <button class="btn btn-primary" id="saveBookmarkBtn">Enregistrer</button>
            </div>
        </div>
    </div>

    <script>
        let data = {sections: []};
        let controlsVisible = false;
        let currentEditSection = null;
        let currentEditSubsection = null;
        let currentEditBookmark = null;
        let searchTerm = '';

        function loadData() {
            const saved = localStorage.getItem('bookmarksData');
            if (saved) data = JSON.parse(saved);
            const darkMode = localStorage.getItem('darkMode') === 'true';
            if (darkMode) {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeBtn').textContent = '☀️ Mode Clair';
            }
            render();
        }

        function saveData() {
            localStorage.setItem('bookmarksData', JSON.stringify(data));
        }

        function highlightText(text, search) {
            if (!search) return text;
            const regex = new RegExp(`(${search})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function filterData() {
            const term = searchTerm.toLowerCase();
            let totalBookmarks = 0;
            let visibleBookmarks = 0;
            
            data.sections.forEach(section => {
                section.subsections.forEach(subsection => {
                    totalBookmarks += subsection.bookmarks.length;
                });
            });
            
            if (!term) {
                document.getElementById('searchResultsInfo').textContent = '';
                return { filter: false, visibleBookmarks: totalBookmarks };
            }
            
            const filteredSections = data.sections.map(section => {
                const filteredSubsections = section.subsections.map(subsection => {
                    const filteredBookmarks = subsection.bookmarks.filter(bookmark => {
                        return bookmark.name.toLowerCase().includes(term) || 
                               bookmark.url.toLowerCase().includes(term);
                    });
                    
                    visibleBookmarks += filteredBookmarks.length;
                    
                    return {
                        ...subsection,
                        bookmarks: filteredBookmarks,
                        visible: filteredBookmarks.length > 0 || 
                                subsection.name.toLowerCase().includes(term)
                    };
                });
                
                return {
                    ...section,
                    subsections: filteredSubsections,
                    visible: filteredSubsections.some(ss => ss.visible) || 
                            section.name.toLowerCase().includes(term)
                };
            });
            
            const resultsText = visibleBookmarks === 0 
                ? 'Aucun résultat trouvé' 
                : `${visibleBookmarks} résultat${visibleBookmarks > 1 ? 's' : ''} trouvé${visibleBookmarks > 1 ? 's' : ''}`;
            
            document.getElementById('searchResultsInfo').textContent = resultsText;
            
            return { filter: true, filteredSections, visibleBookmarks };
        }

        function render() {
            const container = document.getElementById('sections-container');
            
            if (data.sections.length === 0) {
                container.innerHTML = '<div class="empty-state"><h2>Aucune section</h2><p>Cliquez sur "Ajouter Section" pour commencer</p></div>';
                return;
            }
            
            const filterResult = filterData();
            const sectionsToRender = filterResult.filter ? filterResult.filteredSections : data.sections;
            
            container.innerHTML = sectionsToRender.map((section, sIdx) => {
                const sectionVisible = !filterResult.filter || section.visible;
                const sectionClass = sectionVisible ? 'section' : 'section filtered-out';
                
                return `
                <div class="${sectionClass}" draggable="true" data-section-idx="${sIdx}">
                    <div class="section-header">
                        <div class="section-title">${highlightText(section.name, searchTerm)}</div>
                        <div class="section-controls">
                            <button class="btn btn-small btn-primary" onclick="addSubsection(${sIdx})">➕ Sous-section</button>
                            <button class="btn btn-small btn-icon btn-primary" onclick="editSection(${sIdx})">✏️</button>
                            <button class="btn btn-small btn-icon btn-danger" onclick="deleteSection(${sIdx})">🗑️</button>
                        </div>
                    </div>
                    <div class="subsections-grid">
                        ${section.subsections.map((subsection, ssIdx) => {
                            const subsectionVisible = !filterResult.filter || subsection.visible;
                            const subsectionClass = subsectionVisible ? 'subsection' : 'subsection filtered-out';
                            
                            return `
                            <div class="${subsectionClass}" draggable="true" data-section-idx="${sIdx}" data-subsection-idx="${ssIdx}">
                                <div class="subsection-header">
                                    <div class="subsection-title">${highlightText(subsection.name, searchTerm)}</div>
                                    <div class="subsection-controls">
                                        <button class="btn btn-small btn-icon btn-primary" onclick="addBookmark(${sIdx}, ${ssIdx})">➕</button>
                                        <button class="btn btn-small btn-icon btn-primary" onclick="editSubsection(${sIdx}, ${ssIdx})">✏️</button>
                                        <button class="btn btn-small btn-icon btn-danger" onclick="deleteSubsection(${sIdx}, ${ssIdx})">🗑️</button>
                                    </div>
                                </div>
                                <div class="bookmarks-list">
                                    ${subsection.bookmarks.map((bookmark, bIdx) => `
                                        <div class="bookmark-item">
                                            <a href="${bookmark.url}" class="bookmark-link" target="_blank">
                                                <span class="bookmark-icon">🔖</span>
                                                <span>${highlightText(bookmark.name, searchTerm)}</span>
                                            </a>
                                            <div class="bookmark-controls">
                                                <button class="btn btn-small btn-icon btn-primary" onclick="editBookmark(${sIdx}, ${ssIdx}, ${bIdx})">✏️</button>
                                                <button class="btn btn-small btn-icon btn-danger" onclick="deleteBookmark(${sIdx}, ${ssIdx}, ${bIdx})">🗑️</button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;}).join('')}
                    </div>
                </div>
            `;}).join('');
            
            if (controlsVisible) document.body.classList.add('controls-visible');
            setupDragAndDrop();
        }

        function setupDragAndDrop() {
            const sections = document.querySelectorAll('.section');
            sections.forEach(section => {
                section.addEventListener('dragstart', handleSectionDragStart);
                section.addEventListener('dragover', handleSectionDragOver);
                section.addEventListener('drop', handleSectionDrop);
                section.addEventListener('dragend', handleDragEnd);
            });
            
            const subsections = document.querySelectorAll('.subsection');
            subsections.forEach(subsection => {
                subsection.addEventListener('dragstart', handleSubsectionDragStart);
                subsection.addEventListener('dragover', handleSubsectionDragOver);
                subsection.addEventListener('drop', handleSubsectionDrop);
                subsection.addEventListener('dragend', handleDragEnd);
            });
        }

        let draggedElement = null;
        let draggedType = null;

        function handleSectionDragStart(e) {
            draggedElement = this;
            draggedType = 'section';
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleSectionDragOver(e) {
            if (draggedType !== 'section') return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            this.classList.add('drag-over');
        }

        function handleSectionDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (draggedType !== 'section' || draggedElement === this) return;
            const fromIdx = parseInt(draggedElement.dataset.sectionIdx);
            const toIdx = parseInt(this.dataset.sectionIdx);
            const [removed] = data.sections.splice(fromIdx, 1);
            data.sections.splice(toIdx, 0, removed);
            saveData();
            render();
        }

        function handleSubsectionDragStart(e) {
            draggedElement = this;
            draggedType = 'subsection';
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.stopPropagation();
        }

        function handleSubsectionDragOver(e) {
            if (draggedType !== 'subsection') return;
            e.preventDefault();
            e.stopPropagation();
            e.dataTransfer.dropEffect = 'move';
            this.classList.add('drag-over');
        }

        function handleSubsectionDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            this.classList.remove('drag-over');
            if (draggedType !== 'subsection' || draggedElement === this) return;
            const fromSectionIdx = parseInt(draggedElement.dataset.sectionIdx);
            const fromSubsectionIdx = parseInt(draggedElement.dataset.subsectionIdx);
            const toSectionIdx = parseInt(this.dataset.sectionIdx);
            const toSubsectionIdx = parseInt(this.dataset.subsectionIdx);
            if (fromSectionIdx === toSectionIdx) {
                const [removed] = data.sections[fromSectionIdx].subsections.splice(fromSubsectionIdx, 1);
                data.sections[toSectionIdx].subsections.splice(toSubsectionIdx, 0, removed);
            }
            saveData();
            render();
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function addSection() {
            currentEditSection = null;
            document.getElementById('sectionNameInput').value = '';
            document.querySelector('#sectionModal .modal-header').textContent = 'Ajouter une section';
            document.getElementById('sectionModal').classList.add('active');
        }

        function editSection(idx) {
            currentEditSection = idx;
            document.getElementById('sectionNameInput').value = data.sections[idx].name;
            document.querySelector('#sectionModal .modal-header').textContent = 'Modifier la section';
            document.getElementById('sectionModal').classList.add('active');
        }

        function deleteSection(idx) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cette section et tout son contenu ?')) {
                data.sections.splice(idx, 1);
                saveData();
                render();
            }
        }

        function saveSection() {
            const name = document.getElementById('sectionNameInput').value.trim();
            if (!name) return alert('Veuillez entrer un nom');
            if (currentEditSection !== null) {
                data.sections[currentEditSection].name = name;
            } else {
                data.sections.push({ name, subsections: [] });
            }
            saveData();
            render();
            document.getElementById('sectionModal').classList.remove('active');
        }

        function addSubsection(sectionIdx) {
            currentEditSection = sectionIdx;
            currentEditSubsection = null;
            document.getElementById('subsectionNameInput').value = '';
            document.querySelector('#subsectionModal .modal-header').textContent = 'Ajouter une sous-section';
            document.getElementById('subsectionModal').classList.add('active');
        }

        function editSubsection(sectionIdx, subsectionIdx) {
            currentEditSection = sectionIdx;
            currentEditSubsection = subsectionIdx;
            document.getElementById('subsectionNameInput').value = data.sections[sectionIdx].subsections[subsectionIdx].name;
            document.querySelector('#subsectionModal .modal-header').textContent = 'Modifier la sous-section';
            document.getElementById('subsectionModal').classList.add('active');
        }

        function deleteSubsection(sectionIdx, subsectionIdx) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cette sous-section et tous ses favoris ?')) {
                data.sections[sectionIdx].subsections.splice(subsectionIdx, 1);
                saveData();
                render();
            }
        }

        function saveSubsection() {
            const name = document.getElementById('subsectionNameInput').value.trim();
            if (!name) return alert('Veuillez entrer un nom');
            if (currentEditSubsection !== null) {
                data.sections[currentEditSection].subsections[currentEditSubsection].name = name;
            } else {
                data.sections[currentEditSection].subsections.push({ name, bookmarks: [] });
            }
            saveData();
            render();
            document.getElementById('subsectionModal').classList.remove('active');
        }

        function addBookmark(sectionIdx, subsectionIdx) {
            currentEditSection = sectionIdx;
            currentEditSubsection = subsectionIdx;
            currentEditBookmark = null;
            document.getElementById('bookmarkNameInput').value = '';
            document.getElementById('bookmarkUrlInput').value = '';
            document.querySelector('#bookmarkModal .modal-header').textContent = 'Ajouter un favori';
            document.getElementById('bookmarkModal').classList.add('active');
        }

        function editBookmark(sectionIdx, subsectionIdx, bookmarkIdx) {
            currentEditSection = sectionIdx;
            currentEditSubsection = subsectionIdx;
            currentEditBookmark = bookmarkIdx;
            const bookmark = data.sections[sectionIdx].subsections[subsectionIdx].bookmarks[bookmarkIdx];
            document.getElementById('bookmarkNameInput').value = bookmark.name;
            document.getElementById('bookmarkUrlInput').value = bookmark.url;
            document.querySelector('#bookmarkModal .modal-header').textContent = 'Modifier le favori';
            document.getElementById('bookmarkModal').classList.add('active');
        }

        function deleteBookmark(sectionIdx, subsectionIdx, bookmarkIdx) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce favori ?')) {
                data.sections[sectionIdx].subsections[subsectionIdx].bookmarks.splice(bookmarkIdx, 1);
                saveData();
                render();
            }
        }

        function saveBookmark() {
            const name = document.getElementById('bookmarkNameInput').value.trim();
            const url = document.getElementById('bookmarkUrlInput').value.trim();
            if (!name || !url) return alert('Veuillez remplir tous les champs');
            if (currentEditBookmark !== null) {
                data.sections[currentEditSection].subsections[currentEditSubsection].bookmarks[currentEditBookmark] = { name, url };
            } else {
                data.sections[currentEditSection].subsections[currentEditSubsection].bookmarks.push({ name, url });
            }
            saveData();
            render();
            document.getElementById('bookmarkModal').classList.remove('active');
        }

        function toggleControls() {
            controlsVisible = !controlsVisible;
            if (controlsVisible) {
                document.body.classList.add('controls-visible');
                document.getElementById('toggleControlsBtn').textContent = '🙈 Cacher les contrôles';
            } else {
                document.body.classList.remove('controls-visible');
                document.getElementById('toggleControlsBtn').textContent = '👁️ Afficher les contrôles';
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️ Mode Clair' : '🌙 Mode Sombre';
        }

        function exportData() {
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `favoris-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            document.getElementById('importInput').click();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.trim();
            render();
        });

        document.getElementById('addSectionBtn').addEventListener('click', addSection);
        document.getElementById('toggleControlsBtn').addEventListener('click', toggleControls);
        document.getElementById('darkModeBtn').addEventListener('click', toggleDarkMode);
        document.getElementById('exportBtn').addEventListener('click', exportData);
        document.getElementById('importBtn').addEventListener('click', importData);
        document.getElementById('saveSectionBtn').addEventListener('click', saveSection);
        document.getElementById('cancelSectionBtn').addEventListener('click', () => {
            document.getElementById('sectionModal').classList.remove('active');
        });
        document.getElementById('saveSubsectionBtn').addEventListener('click', saveSubsection);
        document.getElementById('cancelSubsectionBtn').addEventListener('click', () => {
            document.getElementById('subsectionModal').classList.remove('active');
        });
        document.getElementById('saveBookmarkBtn').addEventListener('click', saveBookmark);
        document.getElementById('cancelBookmarkBtn').addEventListener('click', () => {
            document.getElementById('bookmarkModal').classList.remove('active');
        });
        document.getElementById('importInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    if (confirm('Voulez-vous remplacer vos favoris actuels par ceux importés ?')) {
                        data = imported;
                        saveData();
                        render();
                    }
                } catch (error) {
                    alert('Erreur lors de l\'import du fichier');
                }
            };
            reader.readAsText(file);
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        });

        loadData();
    </script>
</body>
</html>
